<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="description" content="Noteworthy — Capture your thoughts." />
    <meta name="theme-color" content="#0e0e12" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Noteworthy</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <!-- ===== PIN VIEW ===== -->
    <section id="pin-view" class="view hidden" aria-label="Enter PIN">
        <div class="pin-container">
            <div class="pin-brand">
                <span class="pin-emoji">🧠</span>
                <h1 class="pin-title">Noteworthy</h1>
            </div>
            <div class="pin-dots" aria-label="PIN input" role="status">
                <span class="pin-dot"></span><span class="pin-dot"></span><span class="pin-dot"></span>
                <span class="pin-dot"></span><span class="pin-dot"></span><span class="pin-dot"></span>
            </div>
            <p id="pin-error" class="pin-error" role="alert" aria-live="polite"></p>
            <div class="pin-pad" role="grid" aria-label="Number pad">
                <button class="pin-key" data-digit="1">1</button>
                <button class="pin-key" data-digit="2">2</button>
                <button class="pin-key" data-digit="3">3</button>
                <button class="pin-key" data-digit="4">4</button>
                <button class="pin-key" data-digit="5">5</button>
                <button class="pin-key" data-digit="6">6</button>
                <button class="pin-key" data-digit="7">7</button>
                <button class="pin-key" data-digit="8">8</button>
                <button class="pin-key" data-digit="9">9</button>
                <div class="pin-key-spacer"></div>
                <button class="pin-key" data-digit="0">0</button>
                <button class="pin-key pin-key-back" id="pin-backspace" aria-label="Backspace">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"></path>
                        <line x1="18" y1="9" x2="12" y2="15"></line>
                        <line x1="12" y1="9" x2="18" y2="15"></line>
                    </svg>
                </button>
            </div>
        </div>
    </section>

    <!-- ===== PROFILE VIEW ===== -->
    <section id="profile-view" class="view hidden" aria-label="Choose profile">
        <div class="profile-container">
            <h2 class="profile-heading">Who's capturing?</h2>
            <div class="profile-cards">
                <button class="profile-card profile-prineeth" data-profile="prineeth" aria-label="Prineeth's notes">
                    <span class="profile-avatar">P</span>
                    <span class="profile-name">Prineeth</span>
                    <span class="profile-sub">Your notes</span>
                </button>
                <button class="profile-card profile-pramoddini" data-profile="pramoddini"
                    aria-label="Pramoddini's notes">
                    <span class="profile-avatar">P</span>
                    <span class="profile-name">Pramoddini</span>
                    <span class="profile-sub">Her notes</span>
                </button>
            </div>
            <button class="profile-combined" data-profile="combined" aria-label="View combined notes">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round" class="icon">
                    <circle cx="9" cy="7" r="4"></circle>
                    <path d="M3 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"></path>
                    <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                    <path d="M21 21v-2a4 4 0 0 0-3-3.85"></path>
                </svg>
                Combined view
            </button>
        </div>
    </section>

    <!-- ===== CAPTURE VIEW ===== -->
    <section id="capture-view" class="view hidden" aria-label="Capture">
        <header class="top-bar">
            <button id="btn-switch-profile" class="profile-badge" aria-label="Switch profile">
                <span id="active-profile-label">Prineeth</span>
                <svg class="icon-tiny" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="6 9 12 15 18 9"></polyline>
                </svg>
            </button>

            <div class="top-bar-actions">
                <button id="btn-discover" class="btn btn-ghost btn-sm btn-discover" aria-label="Discover">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polygon
                            points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2">
                        </polygon>
                    </svg>
                    <span class="discover-label">Discover</span>
                    <span id="discover-badge" class="discover-badge hidden">0</span>
                </button>
                <button id="btn-notes" class="btn btn-ghost btn-sm" aria-label="View notes">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                    </svg>
                    Notes
                </button>
            </div>
        </header>

        <main class="capture-main">
            <textarea id="note-input" placeholder="Paste or type anything…" aria-label="Note input"></textarea>
        </main>

        <footer class="capture-footer">
            <span id="char-count" class="char-count" aria-live="polite">0</span>
            <button id="btn-send" class="btn btn-send" disabled aria-label="Send note">
                <span class="btn-send-label">Send</span>
                <svg class="btn-send-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </footer>
        <div id="success-ripple" class="success-ripple" aria-hidden="true"></div>
    </section>

    <!-- ===== NOTES PANEL ===== -->
    <aside id="notes-panel" class="notes-panel" aria-label="Your notes">
        <div class="notes-header">
            <div class="notes-header-left">
                <h2 class="notes-title">Notes</h2>
                <span id="notes-profile-badge" class="notes-profile-badge"></span>
            </div>
            <button id="btn-close-notes" class="btn btn-ghost btn-sm" aria-label="Close notes">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
        </div>
        <div id="notes-list" class="notes-list"></div>
    </aside>
    <div id="notes-backdrop" class="notes-backdrop"></div>

    <!-- ===== NOTE DETAIL ===== -->
    <div id="note-detail" class="note-detail hidden" aria-label="Note detail">
        <div class="detail-header">
            <button id="btn-detail-back" class="btn btn-ghost btn-sm" aria-label="Back"><svg class="icon"
                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <polyline points="15 18 9 12 15 6"></polyline>
                </svg> Back</button>
            <div class="detail-actions">
                <button id="btn-reprocess" class="btn btn-ghost btn-sm" aria-label="Re-analyze"
                    title="Re-analyze with AI"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="23 4 23 10 17 10"></polyline>
                        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
                    </svg></button>
                <button id="btn-open-chat" class="btn btn-accent btn-sm" aria-label="Chat"><svg class="icon"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                    </svg> Chat</button>
            </div>
        </div>
        <div id="detail-body" class="detail-body"></div>
    </div>

    <!-- ===== CHAT PANEL ===== -->
    <div id="chat-panel" class="chat-panel hidden" aria-label="Chat">
        <div class="chat-header">
            <button id="btn-close-chat" class="btn btn-ghost btn-sm" aria-label="Close chat"><svg class="icon"
                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <polyline points="15 18 9 12 15 6"></polyline>
                </svg></button>
            <span class="chat-title">Chat</span>
            <div style="width:40px"></div>
        </div>
        <div id="chat-messages" class="chat-messages"></div>
        <form id="chat-form" class="chat-input-bar">
            <input id="chat-input" type="text" placeholder="Ask about this note…" autocomplete="off" />
            <button type="submit" class="btn-chat-send" aria-label="Send">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </form>
    </div>

    <!-- ===== DISCOVER OVERLAY ===== -->
    <div id="discover-view" class="discover-view hidden" aria-label="Discover">
        <div class="discover-header">
            <button id="btn-close-discover" class="btn btn-ghost btn-sm" aria-label="Close discover">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
            <span class="discover-title">Discover</span>
            <button id="btn-gen-cards" class="btn btn-ghost btn-sm" aria-label="Generate new cards"
                title="Generate new cards">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="23 4 23 10 17 10"></polyline>
                    <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
                </svg>
            </button>
        </div>

        <div id="discover-stack" class="discover-stack">
            <!-- Cards inserted by JS -->
        </div>

        <div id="discover-empty" class="discover-empty hidden">
            <div class="discover-empty-icon">✨</div>
            <div class="discover-empty-text">No new cards yet.<br />Keep capturing notes — your feed will grow.</div>
            <button id="btn-gen-cards-empty" class="btn btn-accent btn-sm" style="margin-top:1rem">Generate now</button>
        </div>

        <div class="discover-hints">
            <span class="hint-dismiss">← dismiss</span>
            <span class="hint-accept">accept →</span>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
